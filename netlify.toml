# Netlify configuration — ENGAPE POST
#
# Create React App builds a static bundle into ./build. Netlify runs the build
# command on every push and serves that folder from its CDN.

[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  # Pin the toolchain so a Netlify default bump can't change build output.
  NODE_VERSION = "22"

# ─────────────────────────────────────────────────────────────────────────────
#  Redirects
#
#  The SPA fallback lives in public/_redirects, which CRA copies into build/.
#  Keeping it there — rather than duplicating it here — means the rule travels
#  with the build artefact and there is only one place to edit it.
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────────────────────────────────────
#  Caching
#
#  Everything under /static is content-hashed by CRA, so a new deploy produces
#  new filenames. Those are safe to cache forever. index.html must never be
#  cached, or returning visitors keep loading the previous deploy's bundle.
# ─────────────────────────────────────────────────────────────────────────────

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ─────────────────────────────────────────────────────────────────────────────
#  Security headers
# ─────────────────────────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"

# ─────────────────────────────────────────────────────────────────────────────
#  Deploy previews and branch deploys
#
#  Keep work-in-progress copies of the site out of search results. Only the
#  production context is indexable.
# ─────────────────────────────────────────────────────────────────────────────

[context.deploy-preview]
  [[context.deploy-preview.headers]]
    for = "/*"
    [context.deploy-preview.headers.values]
      X-Robots-Tag = "noindex"

[context.branch-deploy]
  [[context.branch-deploy.headers]]
    for = "/*"
    [context.branch-deploy.headers.values]
      X-Robots-Tag = "noindex"
